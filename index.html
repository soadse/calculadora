<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo/style.css">
    <link rel="stylesheet" href="estilo/media.css">
    <link rel="stylesheet" href="estilo/paisagem.css" media="screen and (orientation: landscape)">
    <title>Calculadora</title>
</head>
<body>
    <div id="resultado2">
        <div class="numero">0</div>
    </div>
    <div id="calculadora">
        <div id="tela">
            <div id="resultado">0</div>
        </div>
        <div id="teclado">
            <div id="row1">
                <div class="row1" id="ac">AC</div>
                <div class="row1" id="maisoumenos">+/-</div>
                <div class="row1" id="porcento">%</div>
                <div class="row1 orange">÷</div>
            </div>
            <div id="row2">
                <div class="row2" id="sete">7</div>
                <div class="row2" id="oito">8</div>
                <div class="row2" id="nove">9</div>
                <div class="row2 orange" id="vezes">X</div>
            </div>
            <div id="row3">
                <div class="row3" id="quatro">4</div>
                <div class="row3" id="cinco">5</div>
                <div class="row3" id="seis">6</div>
                <div class="row3 orange" id="menos">-</div>
            </div>
            <div id="row4">
                <div class="row4" id="um">1</div>
                <div class="row4" id="dois">2</div>
                <div class="row4" id="tres">3</div>
                <div class="row4 orange" id="mais">+</div>
            </div>
            <div id="row5">
                <div class="row5" id="zero">0</div>
                <div class="row5" id="virgula">,</div>
                <div class="row5 orange" id="igual">=</div>
            </div>
        </div>
    </div>

    
    <script src="script/script.js"></script>
</body>
</html>
