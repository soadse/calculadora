<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo/style.css">
    <link rel="stylesheet" href="estilo/media.css">
    <link rel="stylesheet" href="estilo/paisagem.css" media="screen and (orientation: landscape)">
    <title>Calculadora</title>
</head>
<body>
    <div id="resultado2">
        <div class="numero">0</div>
    </div>
    <div id="calculadora">
        <div id="tela">
            <div id="resultado">0</div>
        </div>
        <div id="teclado">
            <div id="row1">
                <div class="row1">AC</div>
                <div class="row1">+/-</div>
                <div class="row1">%</div>
                <div class="row1 orange">÷</div>
            </div>
            <div id="row2">
                <div class="row2">7</div>
                <div class="row2">8</div>
                <div class="row2">9</div>
                <div class="row2 orange">X</div>
            </div>
            <div id="row3">
                <div class="row3">4</div>
                <div class="row3">5</div>
                <div class="row3">6</div>
                <div class="row3 orange">-</div>
            </div>
            <div id="row4">
                <div class="row4">1</div>
                <div class="row4">2</div>
                <div class="row4">3</div>
                <div class="row4 orange">+</div>
            </div>
            <div id="row5">
                <div id="zero" class="row5">0</div>
                <div class="row5">,</div>
                <div class="row5 orange">=</div>
            </div>
        </div>
    </div>
</body>
</html>
